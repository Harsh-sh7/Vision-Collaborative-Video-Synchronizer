<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Watch Party - Premium Player</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: rgba(255, 255, 255, 0.025);
      --text-primary: #ffffff;
      --text-secondary: #a3a3a3;
      --accent-color: #ffffff;
      --accent-hover: #e5e5e5;
      --border-color: rgba(255, 255, 255, 0.12);
      --danger-color: #ef4444;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    header {
      background: rgba(3, 7, 18, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    header.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #a3a3a3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .room-indicator {
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.04);
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatars-container {
      display: flex;
      align-items: center;
      flex-direction: row-reverse;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #262626;
      border: 2px solid #000000;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      margin-left: -8px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-avatar:hover {
      transform: translateY(-2px);
      z-index: 99 !important;
    }

    .avatar-icon-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: #111;
      border: 1px solid #333;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
    }

    main {
      flex-grow: 1;
      min-height: 0;
      height: 0; /* Constrain main height to flex space, preventing overflow */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #000;
      width: 100%;
    }

    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      z-index: 1;
      pointer-events: none;
    }

    /* Mockup-Aligned Floating Controls */
    .custom-controls-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 740px;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 12px 20px;
      display: none; /* Show when video is loaded */
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .custom-controls-bar.fade-out {
      opacity: 0;
      transform: translate(-50%, 15px);
      pointer-events: none;
    }

    /* Timeline Scrubber - Spans entire width at the bottom of the card */
    .timeline-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      transition: height 0.15s;
    }

    .timeline-fill {
      height: 100%;
      background: #ffffff;
      border-radius: 2px;
      width: 0%;
      position: relative;
    }

    .timeline-handle {
      position: absolute;
      right: -6px;
      top: -4px;
      width: 12px;
      height: 12px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      transform: scale(0);
      transition: transform 0.15s;
    }

    .timeline-container:hover .timeline-handle {
      transform: scale(1);
    }

    .timeline-container:hover {
      height: 6px;
    }

    /* Row Layout */
    .controls-row {
      display: grid;
      grid-template-columns: 1.4fr auto 1.6fr;
      align-items: center;
      width: 100%;
      gap: 12px;
    }

    .controls-left {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: flex-start;
      min-width: 0;
    }

    .controls-center {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      min-width: 0;
    }

    .control-btn {
      background: none;
      border: none;
      color: #f1f5f9;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .control-btn.active {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #ffffff;
    }

    .control-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Main Play button in the center (mockup aligned) */
    .play-btn-circle {
      background: var(--accent-color) !important;
      color: #000000 !important;
      width: 44px;
      height: 44px;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
    }

    .play-btn-circle:hover {
      background: var(--accent-hover) !important;
      transform: scale(1.05);
    }

    /* Left side details */
    .left-status-text {
      font-size: 12px;
      font-weight: 600;
      color: #fbbf24;
      letter-spacing: 0.2px;
    }

    .time-display {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* Volume container with hover slide-out */
    .volume-panel {
      display: flex;
      align-items: center;
      gap: 0;
      transition: all 0.3s ease;
    }

    .volume-slider {
      width: 0;
      opacity: 0;
      height: 3px;
      accent-color: var(--accent-color);
      cursor: pointer;
      transition: width 0.25s ease, opacity 0.25s ease, margin 0.25s ease;
      margin: 0;
      padding: 0;
      border: none;
    }

    .volume-panel:hover .volume-slider {
      width: 60px;
      opacity: 1;
      margin-left: 6px;
    }

    .status-dot-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
      transition: background-color 0.3s, color 0.3s;
      margin: 0 8px;
    }

    .status-dot-indicator::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 50%;
      border: 2px solid currentColor;
      opacity: 0.4;
      animation: statusPulse 2s infinite ease-in-out;
    }

    .status-dot-indicator.unlocked {
      background-color: #3b82f6;
      color: #3b82f6;
    }

    .status-dot-indicator.locked {
      background-color: #ef4444;
      color: #ef4444;
    }

    @keyframes statusPulse {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.6);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 0.6;
      }
    }

    /* Chat Toggle Badge */
    .chat-btn-wrapper {
      position: relative;
    }

    .chat-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: var(--danger-color);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: none;
    }

    /* Drop Zone styling */
    .drop-container {
      max-width: 480px;
      width: 90%;
      padding: 40px;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .drop-container.hover {
      border-color: var(--accent-color);
      background: rgba(255, 255, 255, 0.05);
      transform: scale(1.01);
    }

    .drop-icon {
      font-size: 48px;
      opacity: 0.85;
    }

    .drop-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .drop-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .file-input-btn {
      padding: 10px 24px;
      background: var(--accent-color);
      color: #000000;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .file-input-btn:hover {
      background: var(--accent-hover);
    }

    /* Buffering progress bar overlay */
    .buffer-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 80%;
      max-width: 320px;
      background: rgba(15, 23, 42, 0.8);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    .buffer-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .buffer-fill {
      height: 100%;
      background: var(--accent-color);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Notification Banner */
    .notification-banner {
      position: absolute;
      top: 24px;
      left: 24px;
      background: rgba(16, 185, 129, 0.9);
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      z-index: 200;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: none;
      animation: slideInLeft 0.3s ease;
    }

    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Elegant Sliding Chat Sidebar */
    .chat-drawer {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 320px;
      background: rgba(11, 15, 25, 0.82);
      backdrop-filter: blur(24px);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 500;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
    }

    .chat-drawer.open {
      transform: translateX(0);
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .close-chat-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
    }

    .chat-messages {
      flex-grow: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 5px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .chat-bubble {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      align-self: flex-start;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-bubble.mine {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      align-self: flex-end;
    }

    .sender-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .chat-bubble.mine .sender-name {
      color: #ffffff;
    }

    .message-text {
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
      user-select: text;
    }

    /* Embedded Chat Reaction Drawer Panel */
    .reaction-drawer-panel {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.02);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 8px;
    }

    .reaction-emoji-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .reaction-emoji-btn:hover {
      transform: scale(1.25);
    }

    /* Input panel */
    .chat-input-panel {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
      background: rgba(3, 7, 18, 0.4);
    }

    .chat-input {
      flex-grow: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: var(--accent-color);
    }

    .chat-send-btn {
      background: var(--accent-color);
      border: none;
      color: #000000;
      padding: 0 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-send-btn:hover {
      background: var(--accent-hover);
    }

    /* Responsive Media Queries */
    @media (max-width: 768px) {
      .controls-row {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }
      .controls-left, .controls-center, .controls-right {
        flex: 1 1 100%;
        justify-content: center;
        width: 100%;
        text-align: center;
        gap: 12px;
      }
      .controls-left {
        order: 2;
      }
      .controls-center {
        order: 1;
      }
      .controls-right {
        order: 3;
        flex-wrap: wrap;
      }
      .volume-slider {
        width: 50px;
      }
    }

    @media (max-width: 820px) {
      .volume-slider {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .volume-slider {
        display: none;
      }
      .mode-status-badge {
        font-size: 9px;
        padding: 2px 6px;
      }
    }

    /* Floating Chat Toast Notification */
    .chat-toast {
      position: absolute;
      bottom: 110px;
      right: 24px;
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px 16px;
      display: none;
      flex-direction: column;
      gap: 4px;
      max-width: 250px;
      z-index: 150;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      animation: toastSlideIn 0.3s ease-out;
    }

    @keyframes toastSlideIn {
      from { transform: translateY(20px) opacity: 0; }
      to { transform: translateY(0) opacity: 1; }
    }

    .chat-toast-sender {
      font-size: 10px;
      font-weight: 800;
      color: #a5b4fc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chat-toast-text {
      font-size: 13px;
      color: #f1f5f9;
      word-break: break-all;
    }

    /* Invisible shield to capture hover and click on top of iframe */
    .pointer-shield {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 80;
      background: rgba(0, 0, 0, 0);
      display: none;
    }
    /* Floating Webcam Feeds Grid (Overlay Container) */
    .webcam-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 95;
      pointer-events: none;
    }

    .webcam-card {
      width: 200px;
      height: 150px;
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      overflow: hidden;
      position: absolute; /* Enable absolute drag coordinates */
      pointer-events: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      resize: both;
      min-width: 140px;
      min-height: 105px;
      max-width: 480px;
      max-height: 360px;
      transition: border-color 0.2s;
      cursor: grab;
    }

    .webcam-card:active {
      cursor: grabbing;
    }

    .webcam-card:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .webcam-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      border-radius: 11px;
      display: block; /* Override global video display: none */
    }

    .webcam-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      pointer-events: none;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <header id="player-header">
    <div class="logo-text">Universal Watch Party Player</div>
    <div class="header-right">
      <div class="avatars-container" id="avatars-container"></div>
      <div id="room-badge" class="room-indicator">Not connected to room</div>
    </div>
  </header>

  <main>
    <div class="player-container" id="player-container">
      <video id="sync-video" style="z-index: 1; position: relative;"></video>
      <iframe id="yt-player" style="display: none; width: 100%; height: 100%; border: none; z-index: 10; position: relative;" allow="autoplay; encrypted-media; fullscreen"></iframe>
      
      <!-- Transparent Shield to capture mouse events on top of iframe -->
      <div class="pointer-shield" id="pointer-shield"></div>
      
      <!-- Host Notification Banner -->
      <div class="notification-banner" id="ready-banner">
        X is ready to watch!
      </div>

      <!-- Floating Chat Notification Toast -->
      <div class="chat-toast" id="chat-toast">
        <div class="chat-toast-sender" id="chat-toast-sender">Sender</div>
        <div class="chat-toast-text" id="chat-toast-text">Message content</div>
      </div>

      <!-- Webcam Grid for Floating Video Streams -->
      <div class="webcam-grid" id="webcam-grid"></div>

      <!-- Custom Glassmorphic Controls (Mockup Aligned) -->
      <div class="custom-controls-bar" id="custom-controls">
        <!-- Control buttons row -->
        <div class="controls-row">
          <!-- Left items -->
          <div class="controls-left">
            <span class="left-status-text" id="left-status">Replay</span>
            <span class="time-display" id="time-display">00:00 / 00:00</span>
            <!-- Volume controls relocated to left side for better layout balance -->
            <div class="volume-panel">
              <button class="control-btn" id="mute-btn" title="Mute (M)">
                <svg viewBox="0 0 24 24" width="16" height="16" id="volume-icon-svg">
                  <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
              </button>
              <input type="range" id="volume" min="0" max="1" step="0.05" value="1" class="volume-slider" />
            </div>
          </div>

          <!-- Centered items (mockup play/skip buttons) -->
          <div class="controls-center">
            <!-- Skip Backward Button -->
            <button class="control-btn" id="skip-back" title="Rewind 10s (Left Arrow)">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="currentColor" d="M12.5 3C17.15 3 21 6.85 21 11.5S17.15 20 12.5 20c-3.76 0-6.95-2.48-8-5.83l2-.67c.79 2.5 3.13 4.5 6 4.5 3.59 0 6.5-2.91 6.5-6.5S16.09 5 12.5 5h-1l2.5 2.5L12.5 9l-4-4 4-4 1.5 1.5H12.5z"/>
              </svg>
            </button>

            <!-- Circular main play button -->
            <button class="control-btn play-btn-circle" id="play-btn" title="Play / Pause (Space)">
              <svg viewBox="0 0 24 24" width="18" height="18" id="play-icon-svg">
                <path fill="currentColor" d="M8 5v14l11-7z"/>
              </svg>
            </button>

            <!-- Skip Forward Button -->
            <button class="control-btn" id="skip-forward" title="Forward 10s (Right Arrow)">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="currentColor" d="M11.5 3C6.85 3 3 6.85 3 11.5S6.85 20 11.5 20c3.76 0 6.95-2.48 8-5.83l-2-.67c-.79 2.5-3.13 4.5-6 4.5-3.59 0-6.5-2.91-6.5-6.5S7.91 5 11.5 5h1l-2.5 2.5L11.5 9l4-4-4-4-1.5 1.5H11.5z"/>
              </svg>
            </button>
          </div>

          <!-- Right items -->
          <div class="controls-right">
            <button class="control-btn" id="mic-btn" title="Toggle Mic">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
              </svg>
            </button>
            <button class="control-btn" id="cam-btn" title="Toggle Camera">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
              </svg>
            </button>
            <button class="control-btn" id="cursor-btn" title="Toggle Cursor Sharing">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M13.64 21.97c-.2.03-.4.03-.6 0l-3.37-6.26-2.92 2.92c-.19.19-.45.29-.7.29-.55 0-1-.45-1-1V3.41c0-.26.1-.51.29-.7.19-.19.45-.29.7-.29.55 0 1 .45 1 1v11.12l2.92-2.92c.19-.19.45-.29.7-.29.55 0 1 .45 1 1l-3.37 6.26 3.37.7c.3.06.56.24.68.51.19.43.02.94-.41 1.13z"/>
              </svg>
            </button>

            <div class="status-dot-indicator locked" id="mode-badge" title="Controls Status (Locked)"></div>
            
            <!-- Picture in picture -->
            <button class="control-btn" id="pip-btn" title="Picture in Picture">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/>
              </svg>
            </button>

            <!-- Fullscreen -->
            <button class="control-btn" id="fullscreen-btn" title="Fullscreen (F)">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
              </svg>
            </button>

            <!-- Toggle Chat drawer button -->
            <div class="chat-btn-wrapper">
              <button class="control-btn" id="chat-toggle-btn" title="Toggle Chat">
                <svg viewBox="0 0 24 24" width="16" height="16">
                  <path fill="currentColor" d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                </svg>
              </button>
              <div class="chat-badge" id="chat-unread"></div>
            </div>
          </div>
        </div>

        <!-- Scrubber running along the bottom boundary -->
        <div class="timeline-container" id="timeline">
          <div class="timeline-fill" id="timeline-fill">
            <div class="timeline-handle" id="timeline-handle"></div>
          </div>
        </div>
      </div>
      
      <!-- Embedded Sliding Chat & Reactions Drawer -->
      <div class="chat-drawer" id="chat-drawer">
        <div class="chat-header">
          <span class="chat-title">Room Watch Chat</span>
          <button class="close-chat-btn" id="close-chat-btn">&times;</button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
          <!-- Chat bubbles dynamically rendered here -->
        </div>

        <!-- Floating Reactions Panel -->
        <div class="reaction-drawer-panel">
          <button class="reaction-emoji-btn" data-emoji="HEART">❤️</button>
          <button class="reaction-emoji-btn" data-emoji="LIKE">👍</button>
          <button class="reaction-emoji-btn" data-emoji="LAUGH">😂</button>
          <button class="reaction-emoji-btn" data-emoji="FIRE">🔥</button>
          <button class="reaction-emoji-btn" data-emoji="WOW">😮</button>
        </div>

        <!-- Chat message input field -->
        <div class="chat-input-panel">
          <input type="text" class="chat-input" id="chat-input-field" placeholder="Send a message..." autocomplete="off" />
          <button class="chat-send-btn" id="chat-send-btn">Send</button>
        </div>
      </div>
    </div>

    <!-- Buffering overlay indicator -->
    <div class="buffer-overlay" id="buffer-overlay">
      <div class="drop-icon">⚡</div>
      <div class="drop-title" id="buffer-title">Downloading Video</div>
      <div class="buffer-bar">
        <div class="buffer-fill" id="buffer-fill"></div>
      </div>
      <div class="drop-desc" id="buffer-status">Downloading video chunks... 0%</div>
      <button class="file-input-btn" id="watch-now-btn" style="display: none;">Start Watching</button>
    </div>

    <!-- Drop Zone -->
    <div id="drop-zone" class="drop-container">
      <div class="drop-icon">🎬</div>
      <div id="drop-title" class="drop-title">Load Shared Video File</div>
      <div id="drop-desc" class="drop-desc">Drag and drop your local copy here or click Select File to begin synchronized playback.</div>
      <label>
        <input type="file" id="file-selector" accept="video/*" style="display: none;" />
        <span class="file-input-btn">Select File</span>
      </label>
    </div>
  </main>

  <script type="module" src="/src/player/player.ts"></script>
</body>
</html>
